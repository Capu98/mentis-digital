<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Icon: stylized M with neural nodes -->
  <g transform="translate(24, 28)">
    <!-- Neural connection lines (behind) -->
    <line x1="12" y1="12" x2="50" y2="62" stroke="#4F46E5" stroke-width="2.5" stroke-opacity="0.25" stroke-linecap="round"/>
    <line x1="88" y1="12" x2="50" y2="62" stroke="#4F46E5" stroke-width="2.5" stroke-opacity="0.25" stroke-linecap="round"/>
    <line x1="12" y1="12" x2="88" y2="12" stroke="#4F46E5" stroke-width="2.5" stroke-opacity="0.12" stroke-linecap="round"/>
    <!-- M strokes -->
    <polyline points="12,96 12,12 50,62 88,12 88,96"
      stroke="url(#g1)" stroke-width="9" fill="none"
      stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Node dots -->
    <circle cx="12" cy="12" r="7" fill="#4F46E5"/>
    <circle cx="50" cy="62" r="5.5" fill="#7C3AED"/>
    <circle cx="88" cy="12" r="7" fill="#4F46E5"/>
  </g>

  <!-- Divider line -->
  <rect x="148" y="32" width="3" height="96" fill="#E2E8F0" rx="1.5"/>

  <!-- Company name -->
  <text x="168" y="96"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="58" font-weight="700" letter-spacing="-2"
    fill="white">MENTIS</text>

  <!-- Tagline -->
  <text x="170" y="130"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="24" font-weight="500" letter-spacing="1.5"
    fill="rgba(255,255,255,0.75)">Digital</text>
</svg>
